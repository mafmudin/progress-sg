plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
    id 'maven-publish'
}

android {
    namespace 'udinsi.dev.progress_svg'
    compileSdk 36

    defaultConfig {
        minSdk 21
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
    }

    // Expose a single "release" software component for Maven publishing, including a sources jar.
    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'io.coil-kt.coil3:coil:3.4.0'
    implementation 'io.coil-kt.coil3:coil-svg:3.4.0'
    implementation 'io.coil-kt.coil3:coil-gif:3.4.0'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}

// JitPack consumes this as com.github.mafmudin:progress-sg:<tag>.
// artifactId is pinned to the REPO name (progress-sg), not the Gradle module name
// (progress-svg), to preserve the coordinate already published as 0.0.1.
afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = project.group.toString()
                artifactId = 'progress-sg'
                version = project.version.toString()
            }
        }
    }
}
